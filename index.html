    <script>
      // Apply saved theme before render to prevent flash of wrong theme
      (function() {
        try {
          var t = localStorage.getItem('lc_theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          }
          // Default is light — no class needed
        } catch(e) {}
      })();
    </script>
